<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bento Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
    <style>
        /* ── reset & base ── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            background: #f5f0e8;
            /* subtle warm base */
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* ── animated background orbs ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 18s ease-in-out infinite alternate;
        }
        .orb--1 {
            width: 500px;
            height: 500px;
            top: -150px;
            right: -100px;
            background: #d8b356;
            animation-delay: 0s;
        }
        .orb--2 {
            width: 400px;
            height: 400px;
            bottom: -120px;
            left: -80px;
            background: #d8b356;
            animation-delay: -6s;
            opacity: 0.25;
        }
        .orb--3 {
            width: 300px;
            height: 300px;
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            background: #e8c87a;
            animation-delay: -12s;
            opacity: 0.15;
            filter: blur(150px);
        }

        @keyframes orbFloat {
            0% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(30px, -40px) scale(1.1);
            }
            66% {
                transform: translate(-20px, 30px) scale(0.9);
            }
            100% {
                transform: translate(10px, -20px) scale(1.05);
            }
        }

        /* ── main card ── */
        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border-radius: 3rem;
            padding: 4rem 5rem;
            max-width: 620px;
            width: 100%;
            text-align: center;
            box-shadow:
                0 30px 80px rgba(0, 0, 0, 0.08),
                0 12px 32px rgba(0, 0, 0, 0.04),
                inset 0 1px 0 rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.4s ease;
            animation: cardEntry 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .card:hover {
            transform: translateY(-6px) scale(1.01);
            box-shadow:
                0 50px 100px rgba(216, 179, 86, 0.15),
                0 16px 40px rgba(0, 0, 0, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        @keyframes cardEntry {
            0% {
                opacity: 0;
                transform: scale(0.92) translateY(30px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* ── decorative glow ring ── */
        .card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 3rem;
            padding: 2px;
            background: conic-gradient(from 0deg,
                    transparent,
                    rgba(216, 179, 86, 0.25),
                    rgba(216, 179, 86, 0.6),
                    rgba(216, 179, 86, 0.25),
                    transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0.6;
            animation: borderSpin 10s linear infinite;
        }

        @keyframes borderSpin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* ── icon / emoji ring ── */
        .icon-ring {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d8b356 0%, #f0dfb0 100%);
            box-shadow:
                0 8px 24px rgba(216, 179, 86, 0.35),
                inset 0 2px 0 rgba(255, 255, 255, 0.5);
            margin-bottom: 1.5rem;
            font-size: 2.8rem;
            animation: iconPulse 2.8s ease-in-out infinite;
            transition: transform 0.3s ease;
        }

        .card:hover .icon-ring {
            transform: scale(1.06) rotate(-4deg);
        }

        @keyframes iconPulse {
            0%,
            100% {
                box-shadow: 0 8px 24px rgba(216, 179, 86, 0.35), inset 0 2px 0 rgba(255, 255, 255, 0.5);
                transform: scale(1);
            }
            50% {
                box-shadow: 0 12px 48px rgba(216, 179, 86, 0.5), inset 0 2px 0 rgba(255, 255, 255, 0.7);
                transform: scale(1.04);
            }
        }

        /* ── main text ── */
        .card h1 {
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #1e1a14;
            margin-bottom: 0.4rem;
            background: linear-gradient(135deg, #1e1a14 40%, #d8b356 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }

        .card .sub {
            font-size: 1.05rem;
            font-weight: 400;
            color: rgba(30, 26, 20, 0.55);
            letter-spacing: 0.02em;
            margin-top: 0.25rem;
            font-style: italic;
            border-top: 1px solid rgba(216, 179, 86, 0.2);
            padding-top: 1rem;
            display: inline-block;
        }

        /* ── loading dots ── */
        .dots {
            display: inline-flex;
            gap: 8px;
            margin-top: 1.4rem;
            align-items: center;
            justify-content: center;
        }
        .dots span {
            display: block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #d8b356;
            animation: dotBounce 1.4s ease-in-out infinite both;
            box-shadow: 0 2px 8px rgba(216, 179, 86, 0.3);
        }
        .dots span:nth-child(1) {
            animation-delay: -0.32s;
        }
        .dots span:nth-child(2) {
            animation-delay: -0.16s;
        }
        .dots span:nth-child(3) {
            animation-delay: 0s;
        }

        @keyframes dotBounce {
            0%,
            80%,
            100% {
                transform: scale(0.6);
                opacity: 0.4;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* ── progress bar ── */
        .progress-track {
            width: 100%;
            height: 4px;
            background: rgba(216, 179, 86, 0.18);
            border-radius: 4px;
            margin-top: 2rem;
            overflow: hidden;
            position: relative;
        }
        .progress-track .bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #d8b356, #f0dfb0, #d8b356);
            border-radius: 4px;
            animation: progressFill 3.6s ease-in-out infinite;
            box-shadow: 0 0 12px rgba(216, 179, 86, 0.3);
        }

        @keyframes progressFill {
            0% {
                width: 0%;
                transform: translateX(0);
            }
            50% {
                width: 72%;
                transform: translateX(0);
            }
            100% {
                width: 100%;
                transform: translateX(0);
            }
        }

        /* ── shimmer overlay (subtle) ── */
        .shimmer {
            position: absolute;
            inset: 0;
            border-radius: 3rem;
            overflow: hidden;
            pointer-events: none;
            opacity: 0.15;
        }
        .shimmer::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(105deg,
                    transparent 30%,
                    rgba(255, 255, 255, 0.5) 50%,
                    transparent 70%);
            background-size: 200% 100%;
            animation: shimmerSlide 5s ease-in-out infinite;
        }

        @keyframes shimmerSlide {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        /* ── small badge ── */
        .badge {
            display: inline-block;
            margin-top: 1.6rem;
            padding: 0.3rem 1.2rem;
            border-radius: 100px;
            background: rgba(216, 179, 86, 0.12);
            border: 1px solid rgba(216, 179, 86, 0.15);
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #8a7233;
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
        }

        .card:hover .badge {
            background: rgba(216, 179, 86, 0.2);
            border-color: rgba(216, 179, 86, 0.3);
            transform: scale(1.02);
        }

        /* ── responsive ── */
        @media (max-width: 600px) {
            .card {
                padding: 2.8rem 2rem;
                border-radius: 2.2rem;
            }
            .card h1 {
                font-size: 2.4rem;
            }
            .icon-ring {
                width: 64px;
                height: 64px;
                font-size: 2.2rem;
            }
            .card .sub {
                font-size: 0.95rem;
            }
            .orb--1 {
                width: 300px;
                height: 300px;
                top: -80px;
                right: -60px;
            }
            .orb--2 {
                width: 250px;
                height: 250px;
                bottom: -80px;
                left: -50px;
            }
        }

        @media (max-width: 400px) {
            .card {
                padding: 2rem 1.25rem;
                border-radius: 1.8rem;
            }
            .card h1 {
                font-size: 1.9rem;
            }
            .icon-ring {
                width: 54px;
                height: 54px;
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <!-- background orbs -->
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
    <div class="orb orb--3"></div>

    <!-- card -->
    <div class="card">
        <!-- shimmer -->
        <div class="shimmer"></div>

        <!-- icon -->
        <div class="icon-ring">⚡</div>

        <!-- headline -->
        <h1>I'm working on it</h1>

        <!-- subtext -->
        <div class="sub">Building something great &bull; stay tuned</div>

        <!-- loading dots -->
        <div class="dots">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <!-- progress bar -->
        <div class="progress-track">
            <div class="bar"></div>
        </div>

        <!-- badge -->
        <div class="badge">✨ in progress</div>
    </div>

</body>
</html>
